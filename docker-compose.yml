x-shared-volumes: &shared_volumes
  - ./:/usr/src/app
  - ./data:/usr/src/app/data

services:
  factory_db:
    image: postgres:alpine
    container_name: factory_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_oktell:/var/lib/postgresql/data/
    ports:
      - "5434:5432"

  factory_django:
    build: .
    container_name: factory_django
    env_file:
      - .env
    volumes: *shared_volumes
    ports:
      # - "8000:8000"
      - "8002:8000"
    depends_on:
      - factory_db

    restart: on-failure
    command:
       sh -c "python manage.py migrate --noinput && python manage.py setup_admin && python manage.py runserver 0.0.0.0:8000"

