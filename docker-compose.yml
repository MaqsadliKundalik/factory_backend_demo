services:
  factory_db:
    image: postgres:alpine
    container_name: factory_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_oktell:/var/lib/postgresql/data/
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: factory_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  factory_django:
    build: .
    container_name: factory_django
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    ports:
      - "8002:8000"
    depends_on:
      factory_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn app.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
          --access-logfile -
          --error-logfile -
      "
  bot:
    build: .
    container_name: bot
    env_file:
      - .env
    volumes: *shared_volumes
    depends_on:
      - db
      - django

    restart: unless-stopped
    command: python manage.py bot

  celery:
    build: .
    container_name: factory_celery
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    depends_on:
      factory_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app worker --loglevel=info -c 3

volumes:
  db_oktell:
  static_volume:
