services:
  factory_db:
    image: postgres:alpine
    container_name: factory_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_oktell:/var/lib/postgresql/data/
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  factory_django:
    build: .
    container_name: factory_django
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    ports:
      - "8002:8000"
    depends_on:
      factory_db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        gunicorn app.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

