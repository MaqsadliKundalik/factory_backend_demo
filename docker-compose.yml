services:
  factory_db:
    image: postgres:alpine
    container_name: factory_db
    environment:
      POSTGRES_DB: factory_db
      POSTGRES_USER: factory_user
      POSTGRES_PASSWORD: factory_secure_password_2024
    volumes:
      - db_oktell:/var/lib/postgresql/data/
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory_user -d factory_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ghcr.io/redis/redis/alpine:latest
    container_name: factory_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  factory_django:
    build: .
    container_name: factory_django
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    ports:
      - "8002:8000"
    depends_on:
      factory_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn app.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

  celery:
    build: .
    container_name: factory_celery
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    depends_on:
      factory_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app worker --loglevel=info -c 3

  celery-beat:
    build: .
    container_name: factory_celery_beat
    env_file:
      - .env
    volumes:
      - static_volume:/usr/src/app/staticfiles
    depends_on:
      factory_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app beat --loglevel=info

volumes:
  db_oktell:
  static_volume:
